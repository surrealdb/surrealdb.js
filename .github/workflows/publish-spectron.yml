name: Publish Spectron

# Releases are manual: merge the intended version in packages/spectron/package.json, then run this workflow from the Actions tab (no tag/release automation).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run only (no actual publishing)"
        required: false
        default: false
        type: boolean
      continue:
        description: "Continue even if pack/publish would otherwise fail"
        required: false
        default: false
        type: boolean
      channel:
        description: "Optional npm dist-tag (overrides default from semver pre-release)"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    name: Validate Spectron package
    runs-on: ubuntu-latest
    steps:
      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.2.21

      - name: Code Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Verify package name and version
        run: |
          test "$(jq -r .name packages/spectron/package.json)" = "@surrealdb/spectron"
          test -n "$(jq -r .version packages/spectron/package.json)"

  build-spectron:
    name: Build Spectron
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.2.21

      - name: Code Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        run: bun install

      - name: Build Spectron
        run: bun run build:spectron

      - name: Upload Spectron artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: spectron-publish-dist
          retention-days: 1
          path: packages/spectron/dist/

  dry-run-publish:
    name: Dry run publish
    runs-on: ubuntu-latest
    needs:
      - build-spectron
      - validate
    steps:
      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.2.21

      - name: Code Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        run: bun install

      - name: Download Spectron build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: spectron-publish-dist
          path: packages/spectron/dist/

      - name: Dry run npm publish
        run: |
          ARGS="--dry-run"
          if [ "${{ github.event.inputs.continue }}" = "true" ]; then ARGS="$ARGS --continue"; fi
          if [ -n "${{ github.event.inputs.channel }}" ]; then ARGS="$ARGS --channel=${{ github.event.inputs.channel }}"; fi
          bun run deploy:spectron -- $ARGS

  publish:
    name: Publish to npm
    if: ${{ github.event.inputs.dry_run != 'true' }}
    runs-on: ubuntu-latest
    needs:
      - build-spectron
      - validate
      - dry-run-publish
    steps:
      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.2.21

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Code Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        run: bun install

      - name: Download Spectron build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: spectron-publish-dist
          path: packages/spectron/dist/

      - name: Publish Spectron
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.continue }}" = "true" ]; then ARGS="$ARGS --continue"; fi
          if [ -n "${{ github.event.inputs.channel }}" ]; then ARGS="$ARGS --channel=${{ github.event.inputs.channel }}"; fi
          bun run deploy:spectron -- $ARGS
