name: Publish SQON

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run only (no actual publishing)"
        required: false
        default: false
        type: boolean
      continue:
        description: "Continue publishing even if some packages fail"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  build-sqon:
    name: Build SQON
    runs-on: ubuntu-latest
    steps:
      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.2.21

      - name: Code Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        run: bun install

      - name: Build SQON
        run: bun run build:sqon

      - name: Upload SQON artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sqon-artifacts
          retention-days: 1
          path: packages/sqon/dist/

  dry-run-publish:
    name: Dry Run Publish
    runs-on: ubuntu-latest
    needs: build-sqon
    steps:
      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.2.21

      - name: Code Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        run: bun install

      - name: Download SQON artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: sqon-artifacts
          path: packages/sqon/dist/

      - name: Distribution summary
        run: tree packages/sqon -I src

      - name: Dry run publish SQON
        run: bun run deploy:sqon --dry-run ${{ github.event.inputs.continue == 'true' && '--continue' || '' }}

  publish:
    name: Publish SQON
    if: ${{ !github.event.inputs.dry_run || github.event.inputs.dry_run == 'false' }}
    runs-on: ubuntu-latest
    needs:
      - build-sqon
      - dry-run-publish
    steps:
      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.2.21

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Code Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        run: bun install

      - name: Download SQON artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: sqon-artifacts
          path: packages/sqon/dist/

      - name: Publish SQON
        run: bun run deploy:sqon ${{ github.event.inputs.continue == 'true' && '--continue' || '' }}
