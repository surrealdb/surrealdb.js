name: Publish Surreal

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run only (no actual publishing)"
        required: false
        default: false
        type: boolean
      continue:
        description: "Continue publishing even if some packages fail"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  # Validate versions first
  validate:
    name: Validate Versions
    runs-on: ubuntu-latest
    steps:
      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.2.21

      - name: Code Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        run: bun install

      - name: Validate package versions
        run: bun run validate:versions

  # Build WASM package (depends on SDK)
  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    needs:
      - validate
    steps:
      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.2.21

      - name: Code Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        run: bun install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen-cli
        run: cargo install -f wasm-bindgen-cli --version 0.2.108

      - name: Install wasm-opt
        run: cargo install wasm-opt

      - name: Build WASM
        run: bun run build:wasm

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: wasm-artifacts
          retention-days: 1
          path: |
            packages/wasm/wasm/
            packages/wasm/dist/

  # Build Node package for all platforms (depends on SDK)
  build-node:
    name: Build Node - ${{ matrix.settings.name }}
    runs-on: ${{ matrix.settings.host }}
    needs:
      - validate
    strategy:
      fail-fast: false
      matrix:
        settings:
          - name: macOS x86_64
            host: macos-latest
            target: x86_64-apple-darwin
            build: bun run build:node --target x86_64-apple-darwin

          - name: Windows x86_64
            host: windows-latest
            build: bun run build:node --target x86_64-pc-windows-msvc
            target: x86_64-pc-windows-msvc

          - name: Linux x86_64 (gnu)
            host: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            build: bun run build:node --target x86_64-unknown-linux-gnu -x

          - name: Linux x86_64 (musl)
            host: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            build: bun run build:node --target x86_64-unknown-linux-musl -x

          - name: macOS aarch64
            host: macos-latest
            target: aarch64-apple-darwin
            build: bun run build:node --target aarch64-apple-darwin

          - name: Linux aarch64 (gnu)
            host: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            build: bun run build:node --target aarch64-unknown-linux-gnu -x

          - name: Linux aarch64 (musl)
            host: ubuntu-22.04
            target: aarch64-unknown-linux-musl
            build: bun run build:node --target aarch64-unknown-linux-musl -x

          - name: Windows aarch64
            host: windows-latest
            target: aarch64-pc-windows-msvc
            build: bun run build:node --target aarch64-pc-windows-msvc

          # - host: ubuntu-latest
          #   target: aarch64-linux-android
          #   build: bun run build:node --target aarch64-linux-android
          # - host: ubuntu-latest
          #   target: armv7-linux-androideabi
          #   build: bun run build:node --target armv7-linux-androideabi
    steps:
      - name: Code Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Cache cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.napi-rs
            .cargo-cache
            target/
          key: ${{ matrix.settings.target }}-cargo-${{ matrix.settings.host }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.2.21

      - name: Install cross-compilation toolchain
        if: ${{ matrix.settings.target == 'aarch64-unknown-linux-gnu' }}
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install ziglang
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        if: ${{ contains(matrix.settings.target, 'linux') }}
        with:
          version: 0.14.1

      - name: Install cargo toolchains
        uses: taiki-e/install-action@328a871ad8f62ecac78390391f463ccabc974b72 # v2.69.9
        if: ${{ contains(matrix.settings.target, 'linux') }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tool: cargo-zigbuild

      - name: Install dependencies
        run: bun install

      - name: Build
        shell: bash
        run: ${{ matrix.settings.build }}

      - name: Upload artifact (binary)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bindings-${{ matrix.settings.target }}
          if-no-files-found: error
          path: |
            packages/node/dist/*.node

      - name: Upload artifact (dist)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ matrix.settings.target == 'aarch64-unknown-linux-gnu' }}
        with:
          name: node-artifacts
          if-no-files-found: error
          path: |
            packages/node/dist/
            !packages/node/dist/*.node

  # Dry run publish to verify everything works
  dry-run-publish:
    name: Dry Run Publish
    runs-on: ubuntu-latest
    needs:
      - validate
      - build-wasm
      - build-node
    steps:
      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.2.21

      - name: Code Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        run: bun install

      - name: Download WASM artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: wasm-artifacts
          path: packages/wasm/

      - name: Download Node artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: node-artifacts
          path: packages/node/dist/

      - name: Download node binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: bindings-*
          path: packages/node/dist/
          merge-multiple: true

      - name: Distribution summary
        run: |
          echo "::group::Wasm tree"
          tree packages/wasm -I "src-ts|src-rust|target"
          echo "::endgroup::"

          echo "::group::Node tree"
          tree packages/node -I "src-ts|src-rust|target"
          echo "::endgroup::"

      - name: Dry run publish all packages
        run: bun run deploy:surreal --dry-run ${{ github.event.inputs.continue == 'true' && '--continue' || '' }}

  # Actual publish (only if not dry run)
  publish:
    name: Publish Packages
    runs-on: ubuntu-latest
    needs:
      - validate
      - build-wasm
      - build-node
      - dry-run-publish
    if: ${{ !github.event.inputs.dry_run || github.event.inputs.dry_run == 'false' }}
    steps:
      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.2.21

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Code Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install dependencies
        run: bun install

      - name: Download WASM artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: wasm-artifacts
          path: packages/wasm/

      - name: Download Node artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: node-artifacts
          path: packages/node/dist/

      - name: Download node binaries
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: bindings-*
          path: packages/node/dist/
          merge-multiple: true

      - name: Publish all packages
        run: bun run deploy:surreal ${{ github.event.inputs.continue == 'true' && '--continue' || '' }}
